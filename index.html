<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minha Rádio — Ao vivo</title>
    <script>
        // Aplica o tema salvo antes do primeiro paint (evita flash)
        (function () {
            var theme = localStorage.getItem("site:theme");
            if (!theme) theme = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
            document.documentElement.dataset.theme = theme;
        })();
    </script>
    <link rel="stylesheet" href="site.css">
</head>

<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a class="site-brand" href="index.html"><span class="site-brand-dot"></span> <span class="site-brand-name">Minha Rádio</span></a>
            <nav class="site-nav">
                <a href="#noticias">Notícias</a>
                <a href="#videos">Vídeos</a>
                <a href="#programacao">Programação</a>
                <a href="#equipe">Equipe</a>
                <a href="pagina2.html">Sobre</a>
            </nav>
            <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Alternar tema claro/escuro"></button>
        </div>
    </header>

    <div class="site-container">

        <section class="hero-slider" id="site-hero"></section>

        <section class="site-section" id="noticias">
            <h2 class="site-section-title">Últimas notícias</h2>
            <div class="news-grid" id="site-news"></div>
        </section>

        <section class="site-section" id="videos">
            <h2 class="site-section-title">Vídeos em destaque</h2>
            <div class="videos-grid" id="site-videos"></div>
        </section>

        <section class="site-section" id="programacao">
            <h2 class="site-section-title">Programação da semana</h2>
            <div id="site-schedule"></div>
        </section>

        <section class="site-section" id="equipe">
            <h2 class="site-section-title">Nossa equipe</h2>
            <div class="team-grid" id="site-team"></div>
        </section>

        <footer class="site-footer">
            <span id="site-footer-text"></span>
            <div id="site-social" class="footer-social"></div>
            <span><a href="pagina2.html">Sobre a rádio</a></span>
        </footer>

    </div>

    <!-- Conteúdo do site (edite o content.js) -->
    <script src="content.js"></script>
    <script src="site.js"></script>

    <!-- RadioPlayer: só estas duas linhas em cada página do site -->
    <script src="config.js"></script>
    <script src="js/radioplayer.js"></script>
</body>

</html>
